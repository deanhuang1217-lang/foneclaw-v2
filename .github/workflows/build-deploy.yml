name: Build & Deploy FoneClaw

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install Pillow

      - name: Build HTML
        run: python build_multi.py

      - name: Verify build output
        run: |
          HTML_COUNT=$(find . -maxdepth 1 -name "*.html" | wc -l)
          echo "Generated $HTML_COUNT HTML files"
          if [ "$HTML_COUNT" -lt 50 ]; then
            echo "ERROR: Too few HTML files generated, build may have failed"
            exit 1
          fi

      - name: Backup current site on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            BACKUP="/tmp/foneclaw_backup_$(date +%Y%m%d_%H%M%S)"
            mkdir -p "$BACKUP"
            cp -r /home/www_foneclaw_ai/*.html "$BACKUP/" 2>/dev/null || true
            cp -r /home/www_foneclaw_ai/images "$BACKUP/" 2>/dev/null || true
            echo "Backup: $BACKUP"
            ls -dt /tmp/foneclaw_backup_* 2>/dev/null | tail -n +6 | xargs rm -rf 2>/dev/null || true

      - name: Deploy HTML files via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: >-
            -avzr --delete
            --exclude='images/'
            --exclude='*.py'
            --exclude='*.json'
            --exclude='*.pkl'
            --exclude='*.bak*'
            --exclude='batch_backups/'
            --exclude='.git/'
            --exclude='.github/'
            --exclude='*.md'
            --exclude='*.jpg'
            --exclude='*.jpeg'
            --exclude='*.png'
            --exclude='*.gif'
            --exclude='*.webp'
            --exclude='*.txt'
            --exclude='*.xml'
          path: ./
          remote_path: /home/www_foneclaw_ai/
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}
          remote_port: ${{ secrets.SERVER_PORT }}

      - name: Deploy images via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --compress
          path: ./images/
          remote_path: /home/www_foneclaw_ai/images/
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}
          remote_port: ${{ secrets.SERVER_PORT }}

      - name: Deploy robots.txt and sitemap.xml
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr
          path: ./
          remote_path: /home/www_foneclaw_ai/
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}
          remote_port: ${{ secrets.SERVER_PORT }}
          included_files: |
            robots.txt
            sitemap.xml

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "=== Deployment verification ==="
            echo "HTML files: $(ls /home/www_foneclaw_ai/*.html 2>/dev/null | wc -l)"
            echo "Images: $(ls /home/www_foneclaw_ai/images/ 2>/dev/null | wc -l)"
            echo "Disk: $(du -sh /home/www_foneclaw_ai/ 2>/dev/null)"
